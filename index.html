<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Space & Map Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            user-select: none;
        }
        canvas.webgl {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* Dropdown Control Panel at Top-Right Corner */
        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(4, 6, 18, 0.85);
            border: 2px solid #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            border-radius: 12px;
            padding: 12px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #control-panel label {
            color: #00ffaa;
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        #planet-select {
            background: #090d22;
            color: #ffffff;
            border: 1px solid rgba(0, 240, 255, 0.5);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            outline: transparent;
        }

        /* Side Info HUD Interface (Left Side) */
        #interface {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transform: translateX(-30px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        #interface.active {
            opacity: 1;
            transform: translateX(0);
        }
        .hud-panel {
            background: rgba(4, 6, 18, 0.9);
            border: 2px solid #00f0ff;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.25);
            padding: 25px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            max-width: 350px;
            pointer-events: auto;
            position: relative;
        }
        
        .close-panel-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: transparent;
            color: #ef4444;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
        }

        h2#target-name {
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-weight: 800;
            text-shadow: 0 0 15px currentColor;
            margin-bottom: 5px;
        }
        .classification {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .data-scroll-box {
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .data-scroll-box::-webkit-scrollbar { width: 4px; }
        .data-scroll-box::-webkit-scrollbar-thumb { background: #00f0ff; border-radius: 2px; }
        
        .data-field {
            margin-bottom: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }
        .data-label { color: #00ffaa; font-family: monospace; display: block; font-size: 0.8rem; text-transform: uppercase;}
        .data-value { color: #f8fafc; font-weight: 500; display: block; margin-top: 2px;}
        
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00f0ff;
            font-size: 0.8rem;
            background: rgba(4, 6, 18, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 10px 20px;
            border-radius: 30px;
            pointer-events: none;
            text-align: center;
        }

        /* Audio Status Toast Indicator */
        #audio-toast {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 240, 255, 0.2);
            border: 1px solid #00f0ff;
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: monospace;
            pointer-events: none;
            backdrop-filter: blur(5px);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <label for="planet-select">Target Lock:</label>
        <select id="planet-select">
            <option value="system">-- View Full System --</option>
            <option value="sun">The Sun</option>
            <option value="mercury">Mercury</option>
            <option value="venus">Venus</option>
            <option value="earth">Earth</option>
            <option value="moon">The Moon</option>
            <option value="mars">Mars</option>
            <option value="jupiter">Jupiter</option>
            <option value="saturn">Saturn</option>
            <option value="uranus">Uranus</option>
            <option value="neptune">Neptune</option>
        </select>
    </div>

    <div id="interface">
        <div class="hud-panel">
            <button class="close-panel-btn" id="close-btn">✕</button>
            <h2 id="target-name">SUN</h2>
            <div id="target-type" class="classification">Star</div>
            
            <div class="data-scroll-box">
                <div class="data-field">
                    <span class="data-label">Orbital Velocity</span>
                    <span class="data-value" id="target-speed">-</span>
                </div>
                <div class="data-field">
                    <span class="data-label">Distance Scale</span>
                    <span class="data-value" id="target-dist">-</span>
                </div>
                <div class="data-field">
                    <span class="data-label">Planetary Profile</span>
                    <span class="data-value" id="target-desc">-</span>
                </div>
            </div>
        </div>
    </div>

    <div id="audio-toast">🎵 Cosmic engine activated... Click anywhere if audio is blocked!</div>
    <div id="controls-hint">🗺️ Left-Click & Drag to Rotate | Right-Click (or 2-Finger Drag) to Scroll/Pan Anywhere</div>

    <canvas class="webgl"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- PROACTIVE PROCEDURAL AUDIO SYSTEM ---
        // Generates a cinematic Deep Space Ambient sound purely via Web Audio API 
        // to comply with direct auto-play standards.
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioInitialized = false;

        function startGalaxySoundEngine() {
            if (audioInitialized) return;
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // Master Limiter / Volume Matrix
            const masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.8, audioCtx.currentTime); // Big cinematic presence volume
            masterGain.connect(audioCtx.destination);

            // Sub-Deep Space Engine Drone (Low Freq rumble)
            const oscillatorBase = audioCtx.createOscillator();
            const droneGain = audioCtx.createGain();
            oscillatorBase.type = 'sine';
            oscillatorBase.frequency.setValueAtTime(55, audioCtx.currentTime); // A1 pitch
            droneGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            
            // Atmospheric Shimmering Modulator LFO
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.type = 'triangle';
            lfo.frequency.setValueAtTime(0.2, audioCtx.currentTime); // Super slow cycle
            lfoGain.gain.setValueAtTime(15, audioCtx.currentTime); // modulation pitch depth

            // Cosmic High Resonance Nebular Filter
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(350, audioCtx.currentTime);
            filter.Q.setValueAtTime(4, audioCtx.currentTime);

            // Structure Routing Connections
            lfo.connect(lfoGain);
            lfoGain.connect(oscillatorBase.frequency);
            oscillatorBase.connect(filter);
            filter.connect(droneGain);
            droneGain.connect(masterGain);

            // Secondary Celestial Harmony Drone
            const harmonicOsc = audioCtx.createOscillator();
            const harmonicGain = audioCtx.createGain();
            harmonicOsc.type = 'triangle';
            harmonicOsc.frequency.setValueAtTime(110, audioCtx.currentTime); // A2 higher octave harmonic
            harmonicGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            harmonicOsc.connect(filter);
            
            // Start Oscillators Engine
            lfo.start();
            oscillatorBase.start();
            harmonicOsc.start();

            audioInitialized = true;
            
            // Show toast feedback briefly
            const toast = document.getElementById('audio-toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 4000);
        }

        // Auto-execution attempts across system interactions
        window.addEventListener('DOMContentLoaded', () => {
            startGalaxySoundEngine();
        });
        window.addEventListener('click', startGalaxySoundEngine);
        window.addEventListener('touchstart', startGalaxySoundEngine);


        // --- 1. SETUP ENGINE AND VIEW SYSTEM ---
        const canvas = document.querySelector('canvas.webgl');
        const scene = new THREE.Scene();
        const sizes = { width: window.innerWidth, height: window.innerHeight };

        const camera = new THREE.PerspectiveCamera(50, sizes.width / sizes.height, 0.1, 1500);
        camera.position.set(0, 60, 100);

        const controls = new THREE.OrbitControls(camera, canvas);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 500;
        controls.minDistance = 0.5;
        
        controls.listenToKeyEvents(window);
        controls.keyPanSpeed = 20.0;

        // --- 2. ENHANCED EMISSIVE LIGHTING MATRIX ---
        const ambientLight = new THREE.AmbientLight(0x777799); // Brighter ambient baseline
        scene.add(ambientLight);

        const sunPointLight = new THREE.PointLight(0xffffff, 4.0, 800); // More explosive illumination throw
        scene.add(sunPointLight);

        // --- 3. HIGH-END PROCEDURAL TEXTURE GENERATOR ---
        const generateStellarTexture = (type, baseHexColor, detailHexColor) => {
            const canvasTex = document.createElement('canvas');
            canvasTex.width = 1024;
            canvasTex.height = 512;
            const ctx = canvasTex.getContext('2d');
            
            ctx.fillStyle = baseHexColor;
            ctx.fillRect(0, 0, canvasTex.width, canvasTex.height);
            
            for (let i = 0; i < 25000; i++) { // Denser contrast details
                ctx.fillStyle = detailHexColor;
                let x = Math.random() * canvasTex.width;
                let y = Math.random() * canvasTex.height;
                let r = Math.random() * (type === 'gas' ? 16 : 5);
                
                if (type === 'gas') {
                    ctx.fillRect(x, y, r * 5, r * 0.5);
                } else {
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            const texture = new THREE.CanvasTexture(canvasTex);
            texture.wrapS = THREE.RepeatWrapping;
            return texture;
        };

        // --- 4. COSMIC DEEP SPACE STAR COILS (HYPERVIBRANT CYBER NEBULA) ---
        const createNebulaCloud = () => {
            const count = 75000; // Increased density
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const col = new Float32Array(count * 3);
            
            // Ultra-saturated radiant cyberpunk colors
            const magenta = new THREE.Color('#ff00aa');
            const cyan = new THREE.Color('#00ffff');
            const violet = new THREE.Color('#9d4edd');

            for(let i = 0; i < count; i++) {
                const i3 = i * 3;
                const r = Math.random() * 150;
                const twist = r * 0.4;
                const armAngle = ((i % 4) / 4) * Math.PI * 2;

                const rx = Math.pow(Math.random(), 4) * (Math.random() < 0.5 ? 1 : -1) * 0.5 * r;
                const ry = Math.pow(Math.random(), 4) * (Math.random() < 0.5 ? 1 : -1) * 0.2 * r;
                const rz = Math.pow(Math.random(), 4) * (Math.random() < 0.5 ? 1 : -1) * 0.5 * r;

                pos[i3+0] = Math.cos(armAngle + twist) * r + rx;
                pos[i3+1] = ry - 2;
                pos[i3+2] = Math.sin(armAngle + twist) * r + rz;

                let blended = magenta.clone();
                if (r < 45) {
                    blended.lerp(cyan, r / 45);
                } else {
                    blended.lerp(violet, (r - 45) / 105);
                }
                col[i3+0] = blended.r; col[i3+1] = blended.g; col[i3+2] = blended.b;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
            
            return new THREE.Points(geo, new THREE.PointsMaterial({
                size: 0.05, sizeAttenuation: true, depthWrite: false, // Slightly larger, glowier star cores
                blending: THREE.AdditiveBlending, vertexColors: true
            }));
        };
        scene.add(createNebulaCloud());

        // --- 5. HIGH CONTRAST PLANETARY CONFIGURATION ---
        const sphereGeo = new THREE.SphereGeometry(1, 64, 64);

        // Core Glowing Sun (Vibrant Neon Core)
        const sunTex = generateStellarTexture('solid', '#ffea00', '#ff0000');
        const sunMesh = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({ map: sunTex }));
        sunMesh.scale.set(6.5, 6.5, 6.5);
        scene.add(sunMesh);
        
        sunMesh.userData = {
            id: 'sun', name: "The Sun", type: "G-Type Star", speed: "0.00 km/s (Core Anchor)",
            distance: "0.00M km", color: "#ffea00",
            desc: "The massive heart of our system. It anchors the orbits of all surrounding planets."
        };

        // Highly boosted attractive hexadecimal color definitions
        const configDataset = [
            { id: 'mercury', name: 'Mercury', radius: 0.45, distance: 13, speed: 0.022,  color: '#00ffcc', type: 'Terrestrial Planet', realDist: '57.9M km',  realSpeed: '47.4 km/s',  base: '#0d9488', detail: '#00ffff', style: 'solid' },
            { id: 'venus',   name: 'Venus',   radius: 0.95, distance: 19, speed: 0.016,  color: '#ffaa00', type: 'Terrestrial Planet', realDist: '108.2M km', realSpeed: '35.0 km/s',  base: '#ea580c', detail: '#facc15', style: 'gas' },
            { id: 'earth',   name: 'Earth',   radius: 1.05, distance: 26, speed: 0.012,  color: '#00aeff', type: 'Terrestrial Planet', realDist: '149.6M km', realSpeed: '29.8 km/s',  base: '#0284c7', detail: '#22c55e', style: 'solid' },
            { id: 'mars',    name: 'Mars',    radius: 0.65, distance: 33, speed: 0.009,  color: '#ff3333', type: 'Terrestrial Planet', realDist: '227.9M km', realSpeed: '24.1 km/s',  base: '#dc2626', detail: '#f43f5e', style: 'solid' },
            { id: 'jupiter', name: 'Jupiter', radius: 2.40, distance: 44, speed: 0.006,  color: '#ff6600', type: 'Gas Giant',          realDist: '778.5M km', realSpeed: '13.1 km/s',  base: '#ea580c', detail: '#fed7aa', style: 'gas' },
            { id: 'saturn',  name: 'Saturn',  radius: 1.95, distance: 57, speed: 0.004,  color: '#eab308', type: 'Gas Giant',          realDist: '1.43B km',   realSpeed: '9.7 km/s',   base: '#ca8a04', detail: '#fef08a', style: 'gas', hasRings: true },
            { id: 'uranus',  name: 'Uranus',  radius: 1.40, distance: 68, speed: 0.003,  color: '#00f0ff', type: 'Ice Giant',          realDist: '2.87B km',   realSpeed: '6.8 km/s',   base: '#06b6d4', detail: '#e0f7fa', style: 'gas' },
            { id: 'neptune', name: 'Neptune', radius: 1.35, distance: 77, speed: 0.0022, color: '#6366f1', type: 'Ice Giant',          realDist: '4.50B km',   realSpeed: '5.4 km/s',   base: '#4f46e5', detail: '#312e81', style: 'gas' }
        ];

        const planetaryRegistry = [];
        let earthReference = null;

        configDataset.forEach(cfg => {
            const texture = generateStellarTexture(cfg.style, cfg.base, cfg.detail);
            // Lowered roughness and higher metalness makes the planets pick up light beautifully and glow intensely
            const material = new THREE.MeshStandardMaterial({ 
                map: texture, 
                roughness: 0.3, 
                metalness: 0.4,
                emissive: new THREE.Color(cfg.color),
                emissiveIntensity: 0.25 // Makes planets look vividly active and colorful!
            });
            const mesh = new THREE.Mesh(sphereGeo, material);
            mesh.scale.set(cfg.radius, cfg.radius, cfg.radius);
            scene.add(mesh);

            mesh.userData = {
                id: cfg.id, name: cfg.name, type: cfg.type, speed: cfg.realSpeed, distance: cfg.realDist, color: cfg.color,
                desc: `A stunning ${cfg.type} running along an orbit located ${cfg.realDist} away from the central solar anchor.`
            };

            if (cfg.id === 'earth') earthReference = mesh;

            if (cfg.hasRings) {
                const ringGeo = new THREE.RingGeometry(cfg.radius * 1.3, cfg.radius * 2.5, 64);
                const ringMesh = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: '#f59e0b', side: THREE.DoubleSide, transparent: true, opacity: 0.85 }));
                ringMesh.rotation.x = Math.PI / 2.3;
                mesh.add(ringMesh);
            }

            // --- NOTE: ORBITAL PATH RINGS CODE REMOVED TO HIDE THE CIRCLES COMPLETELY ---

            planetaryRegistry.push({ mesh: mesh, distance: cfg.distance, speed: cfg.speed, angle: Math.random() * Math.PI * 2 });
        });

        // The Luna Moon
        const moonTex = generateStellarTexture('solid', '#94a3b8', '#475569');
        const moonMesh = new THREE.Mesh(sphereGeo, new THREE.MeshStandardMaterial({ map: moonTex, roughness: 0.4, emissive: new THREE.Color('#ffffff'), emissiveIntensity: 0.2 }));
        moonMesh.scale.set(0.24, 0.24, 0.24);
        scene.add(moonMesh);
        
        moonMesh.userData = {
            id: 'moon', name: "The Moon", type: "Natural Satellite", speed: "1.02 km/s",
            distance: "384,400 km from Earth", color: "#a1a1aa",
            desc: "Earth's unique natural companion. It coordinates oceanic tidal fields and displays distinct craters under satellite maps."
        };
        let moonAngle = 0;

        // --- 6. CORE NAVIGATION SYSTEM ENGINE ---
        const raycaster = new THREE.Raycaster();
        const mouseVector = new THREE.Vector2();
        
        let cameraGlideActive = false;
        const cameraTargetPosition = new THREE.Vector3();

        const displayTargetHUD = (targetNode) => {
            cameraTargetPosition.copy(targetNode.position);
            cameraGlideActive = true;
            
            const hud = document.getElementById('interface');
            hud.classList.add('active');

            const nameElement = document.getElementById('target-name');
            nameElement.innerText = targetNode.userData.name.toUpperCase();
            nameElement.style.color = targetNode.userData.color;

            document.getElementById('target-type').innerText = targetNode.userData.type;
            document.getElementById('target-speed').innerText = targetNode.userData.speed;
            document.getElementById('target-dist').innerText = targetNode.userData.distance;
            document.getElementById('target-desc').innerText = targetNode.userData.desc;

            document.getElementById('planet-select').value = targetNode.userData.id;
        };

        const clearTargetHUD = () => {
            cameraTargetPosition.set(0, 0, 0);
            cameraGlideActive = true;
            document.getElementById('interface').classList.remove('active');
            document.getElementById('planet-select').value = 'system';
        };

        // Deactivate Camera Autofocus whenever user interacts with Map Coordinates manually
        window.addEventListener('mousedown', (event) => {
            if (event.target.closest('#control-panel') || event.target.closest('#interface')) return;
            cameraGlideActive = false;
        });

        // Click detection system matching all structural registry objects completely clickable
        window.addEventListener('click', (event) => {
            if (event.target.closest('#control-panel') || event.target.closest('#interface')) return;

            mouseVector.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouseVector.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouseVector, camera);
            const pool = [sunMesh, moonMesh, ...planetaryRegistry.map(p => p.mesh)];
            const hits = raycaster.intersectObjects(pool);

            if (hits.length > 0) {
                displayTargetHUD(hits[0].object);
            }
        });

        document.getElementById('planet-select').addEventListener('change', (e) => {
            const chosen = e.target.value;
            if (chosen === 'system') {
                clearTargetHUD();
            } else if (chosen === 'sun') {
                displayTargetHUD(sunMesh);
            } else if (chosen === 'moon') {
                displayTargetHUD(moonMesh);
            } else {
                const targetObj = planetaryRegistry.find(p => p.mesh.userData.id === chosen);
                if (targetObj) displayTargetHUD(targetObj.mesh);
            }
        });

        document.getElementById('close-btn').addEventListener('click', clearTargetHUD);

        // --- 7. REPETITIVE RENDERING FRAME LOOP ---
        const clock = new THREE.Clock();

        const engineTick = () => {
            const time = clock.getElapsedTime();

            sunMesh.rotation.y = time * 0.04;

            planetaryRegistry.forEach(p => {
                p.angle += p.speed * 0.35;
                p.mesh.position.x = Math.cos(p.angle) * p.distance;
                p.mesh.position.z = Math.sin(p.angle) * p.distance;
                p.mesh.rotation.y = time * 0.25;
            });

            // Map Luna Coordinates around Earth
            if (earthReference) {
                moonAngle += 0.025;
                const radiusOffset = 1.9;
                moonMesh.position.x = earthReference.position.x + Math.cos(moonAngle) * radiusOffset;
                moonMesh.position.z = earthReference.position.z + Math.sin(moonAngle) * radiusOffset;
                moonMesh.position.y = earthReference.position.y;
                moonMesh.rotation.y = time * 0.05;
            }

            // Smooth Interpolated Camera tracking logic
            if (cameraGlideActive) {
                controls.target.lerp(cameraTargetPosition, 0.05);
                
                if (controls.target.distanceTo(cameraTargetPosition) < 0.1) {
                    cameraGlideActive = false;
                }
            }

            controls.update();
            renderer.render(scene, camera);
            window.requestAnimationFrame(engineTick);
        };

        // --- 8. INITIALIZE ENGINE RUNTIME ---
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(sizes.width, sizes.height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        window.addEventListener('resize', () => {
            sizes.width = window.innerWidth;
            sizes.height = window.innerHeight;
            camera.aspect = sizes.width / sizes.height;
            camera.updateProjectionMatrix();
            renderer.setSize(sizes.width, sizes.height);
        });

        engineTick();
    </script>
</body>
</html>
